<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packaging Design Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cinzel:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f6f9;
  --white: #ffffff;
  --border: #dde2ea;
  --blue: #0055b3;
  --blue-light: #e8f0fb;
  --gold: #c9a84c;
  --text: #1a2233;
  --text-muted: #6b7a99;
  --green: #1e7e3e;
  --radius: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--blue);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.topbar h1 {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  color: #fff;
  letter-spacing: 2px;
}
.topbar span {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 1px;
}

/* ── MAIN LAYOUT ── */
.main {
  display: grid;
  grid-template-columns: 480px 1fr;
  gap: 0;
  min-height: calc(100vh - 52px);
}

/* ── FORM PANEL ── */
.form-panel {
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 28px 28px 100px;
  overflow-y: auto;
  max-height: calc(100vh - 52px);
}
.form-panel h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--blue-light);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.form-grid.full { grid-template-columns: 1fr; }
.form-grid.three { grid-template-columns: 1fr 1fr 1fr; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.field input,
.field textarea,
.field select {
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: #fff;
  transition: border-color .2s, box-shadow .2s;
  resize: vertical;
}
.field input:focus,
.field textarea:focus,
.field select:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0,85,179,0.1);
}
.field textarea { min-height: 72px; }

.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin: 20px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--blue-light);
}

/* ingredient rows */
.ing-group { display: flex; flex-direction: column; gap: 8px; }
.ing-row-input { display: flex; gap: 8px; align-items: center; }
.ing-row-input input:first-child { flex: 2; }
.ing-row-input input:last-child  { flex: 1; }

/* action buttons */
.btn-row {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  position: sticky;
  bottom: 0;
  background: var(--white);
  padding: 16px 0 4px;
  border-top: 1px solid var(--border);
}
.btn {
  flex: 1;
  padding: 11px 16px;
  border: none;
  border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s, opacity .15s;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
.btn:active { transform: scale(.98); }
.btn-primary {
  background: var(--blue);
  color: #fff;
}
.btn-secondary {
  background: linear-gradient(90deg, #a07830, #e0c060, #c9a84c);
  color: #1a0a00;
}

/* ── PREVIEW PANEL ── */
.preview-panel {
  background: linear-gradient(135deg, #0d1b35 0%, #1a2a4a 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  overflow-y: auto;
  gap: 36px;
}
.preview-label {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  text-transform: uppercase;
  align-self: flex-start;
  margin-left: 10px;
}

/* ── BOX DESIGN ── */
.box-wrap {
  display: flex;
  align-items: flex-start;
  filter: drop-shadow(0 20px 50px rgba(0,0,0,0.7));
}
.flap {
  height: 52px;
  background: linear-gradient(180deg, #002460, #003a8c);
  border: 1px solid rgba(77,184,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 2px;
}
.box-panel {
  background: linear-gradient(170deg, #002d6b 0%, #0055b3 45%, #0066cc 75%, #002d6b 100%);
  border: 1px solid rgba(77,184,255,0.2);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.gstrip {
  background: linear-gradient(90deg, #a07830, #e0c060, #c9a84c, #e0c060, #a07830);
  width: 100%;
  padding: 3px 6px;
  text-align: center;
  font-size: 6.5px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #1a0a00;
  text-transform: uppercase;
}
.rxbadge {
  border: 2px solid #c9a84c;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.07);
}
.box-wave {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 65px;
  opacity: 0.2;
  pointer-events: none;
}
.bdot {
  position: absolute;
  border-radius: 50%;
  background: rgba(77,184,255,0.1);
  pointer-events: none;
}
.bbrand {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.bsub {
  font-family: 'Cinzel', serif;
  letter-spacing: 3px;
  color: #c9a84c;
  text-transform: uppercase;
}
.bptype {
  font-size: 7px;
  font-weight: 600;
  color: #a0d4ff;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: center;
}
.bshim {
  width: 75%;
  height: 1px;
  background: linear-gradient(90deg, transparent, #c9a84c, transparent);
  margin: 4px auto;
}
.bqbadge {
  border: 1.5px solid #c9a84c;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.07);
}
.bing-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 2px;
}
.bcarea {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(77,184,255,0.25);
  border-radius: 3px;
  padding: 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.bpill {
  border: 1px dashed rgba(77,184,255,0.3);
  border-radius: 5px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,20,60,0.35);
}

/* ── MULTIPLE DESIGNS AREA ── */
.multi-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.multi-label {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.multi-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.mini-card {
  background: linear-gradient(170deg, #002d6b, #0055b3, #002d6b);
  border: 1px solid rgba(77,184,255,0.3);
  border-radius: 8px;
  padding: 12px 14px;
  min-width: 160px;
  cursor: pointer;
  transition: transform .2s, border-color .2s;
  position: relative;
}
.mini-card:hover { transform: translateY(-3px); border-color: #c9a84c; }
.mini-card .mc-brand {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 900;
  color: #fff;
}
.mini-card .mc-sub {
  font-family: 'Cinzel', serif;
  font-size: 6px;
  color: #c9a84c;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 1px;
}
.mini-card .mc-mrp {
  margin-top: 6px;
  font-size: 11px;
  color: #a0d4ff;
  font-weight: 600;
}
.mini-card .mc-ptype {
  font-size: 9px;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
}
.mc-dl-btn {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(201,168,76,0.2);
  border: 1px solid #c9a84c;
  border-radius: 4px;
  color: #c9a84c;
  font-size: 10px;
  padding: 3px 7px;
  cursor: pointer;
  font-weight: 700;
}
.mc-dl-btn:hover { background: rgba(201,168,76,0.4); }

/* success flash */
@keyframes flash {
  0%   { background: #1e7e3e; }
  100% { background: var(--blue); }
}
.flash { animation: flash .4s ease; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>PACKAGING DESIGN EDITOR</h1>
  <span>Abraham Prescription</span>
</div>

<div class="main">

  <!-- ══ FORM PANEL ══ -->
  <div class="form-panel">
    <h2>Edit Packaging Details</h2>

    <!-- Basic Info -->
    <div class="form-grid">
      <div class="field">
        <label>Brand Name</label>
        <input id="f_brand" value="Abraham" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Quantity / Size</label>
        <input id="f_qty" value="20Q" oninput="liveUpdate()">
      </div>
    </div>
    <div class="form-grid">
      <div class="field">
        <label>Product Type</label>
        <input id="f_ptype" value="Medicated Ointment" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Volume / Weight</label>
        <input id="f_volume" value="20 ml" oninput="liveUpdate()">
      </div>
    </div>
    <div class="form-grid">
      <div class="field">
        <label>Effective Result</label>
        <input id="f_effective" value="Effective Result" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Price (MRP)</label>
        <input id="f_mrp" value="520 CAD" oninput="liveUpdate()">
      </div>
    </div>
    <div class="form-grid">
      <div class="field">
        <label>Mfg. Batch No.</label>
        <input id="f_batch" value="MFG-CAN-AB-2459" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Mfg. Date</label>
        <input id="f_mfgdate" value="April 2026" oninput="liveUpdate()">
      </div>
    </div>
    <div class="form-grid">
      <div class="field">
        <label>Expiry Date</label>
        <input id="f_expdate" value="C000G25b" oninput="liveUpdate()">
      </div>
      <div class="field">
        <label>Exp. Month/Year</label>
        <input id="f_expmy" value="May 2026" oninput="liveUpdate()">
      </div>
    </div>

    <!-- Storage -->
    <div class="section-title">Storage &amp; Usage</div>
    <div class="form-grid full">
      <div class="field">
        <label>Storage Instructions</label>
        <textarea id="f_storage" oninput="liveUpdate()">Store in a cool and dry place.</textarea>
      </div>
    </div>
    <div class="form-grid full">
      <div class="field">
        <label>Usage Instructions</label>
        <textarea id="f_usage" oninput="liveUpdate()">Apply a thin layer to the affected area twice daily or as directed by a healthcare professional.</textarea>
      </div>
    </div>

    <!-- Ingredients -->
    <div class="section-title">Ingredients</div>
    <div class="ing-group" id="ingGroup">
      <div class="ing-row-input">
        <input placeholder="Ingredient name" value="Aloe Vera Extract" oninput="liveUpdate()">
        <input placeholder="Amount" value="20%"  oninput="liveUpdate()">
      </div>
      <div class="ing-row-input">
        <input placeholder="Ingredient name" value="Salicylic Acid"   oninput="liveUpdate()">
        <input placeholder="Amount" value="10%"  oninput="liveUpdate()">
      </div>
      <div class="ing-row-input">
        <input placeholder="Ingredient name" value="Calcium Carbonate" oninput="liveUpdate()">
        <input placeholder="Amount" value="30%"  oninput="liveUpdate()">
      </div>
      <div class="ing-row-input">
        <input placeholder="Ingredient name" value="Zinc Oxide"       oninput="liveUpdate()">
        <input placeholder="Amount" value="25%"  oninput="liveUpdate()">
      </div>
      <div class="ing-row-input">
        <input placeholder="Ingredient name" value="Vitamin E Oil"    oninput="liveUpdate()">
        <input placeholder="Amount" value="10%"  oninput="liveUpdate()">
      </div>
    </div>
    <button class="btn btn-primary" style="margin-top:10px;flex:none;padding:8px 16px;font-size:12px;" onclick="addIngredient()">+ Add Ingredient</button>

    <!-- Company -->
    <div class="section-title">Company Details</div>
    <div class="form-grid full">
      <div class="field">
        <label>Marketed By</label>
        <textarea id="f_marketed" oninput="liveUpdate()">Prairie Wellness Biocare Inc.
840 7 Avenue SW, Suite 1200
Calgary, AB T2P 3G2
Canada</textarea>
      </div>
    </div>
    <div class="form-grid full">
      <div class="field">
        <label>Manufactured By</label>
        <textarea id="f_mfgby" oninput="liveUpdate()">Calgary Dermacare Manufacturing Ltd.
2210 32 Avenue NE
Calgary, AB T2E 6T4
Canada</textarea>
      </div>
    </div>
    <div class="form-grid full">
      <div class="field">
        <label>Marketed By Address (short)</label>
        <input id="f_mktaddr" value="840 7 Avenue SW, Calgary, AB T2P 3G2, Canada" oninput="liveUpdate()">
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="btn-row">
      <button class="btn btn-primary" id="updateBtn" onclick="updateDesign()">&#9654; Update Design</button>
      <button class="btn btn-secondary" onclick="createMultiple()">&#128194; Create Multiple Designs</button>
    </div>
  </div>

  <!-- ══ PREVIEW PANEL ══ -->
  <div class="preview-panel" id="previewPanel">
    <div class="preview-label">Live Preview</div>

    <!-- BOX PREVIEW -->
    <div class="box-wrap" id="boxPreview"></div>

    <!-- MULTIPLE DESIGNS -->
    <div class="multi-area" id="multiArea" style="display:none;">
      <div class="multi-label">Generated Designs — Click &#11015; to Download</div>
      <div class="multi-row" id="multiRow"></div>
    </div>
  </div>

</div>

<script>
// ── DATA COLLECTION ───────────────────────────────────────────────
function getData() {
  var ings = [];
  var rows = document.querySelectorAll('#ingGroup .ing-row-input');
  rows.forEach(function(r) {
    var inputs = r.querySelectorAll('input');
    if (inputs[0].value.trim()) {
      ings.push({ name: inputs[0].value.trim(), amount: inputs[1].value.trim() });
    }
  });
  return {
    brand:     document.getElementById('f_brand').value.trim()    || 'Brand Name',
    qty:       document.getElementById('f_qty').value.trim()      || '20Q',
    ptype:     document.getElementById('f_ptype').value.trim()    || 'Ointment',
    volume:    document.getElementById('f_volume').value.trim()   || '20 ml',
    effective: document.getElementById('f_effective').value.trim()|| 'Effective Result',
    mrp:       document.getElementById('f_mrp').value.trim()      || '0.00',
    batch:     document.getElementById('f_batch').value.trim()    || '',
    mfgdate:   document.getElementById('f_mfgdate').value.trim()  || '',
    expdate:   document.getElementById('f_expdate').value.trim()  || '',
    expmy:     document.getElementById('f_expmy').value.trim()    || '',
    storage:   document.getElementById('f_storage').value.trim()  || '',
    usage:     document.getElementById('f_usage').value.trim()    || '',
    marketed:  document.getElementById('f_marketed').value.trim() || '',
    mfgby:     document.getElementById('f_mfgby').value.trim()    || '',
    mktaddr:   document.getElementById('f_mktaddr').value.trim()  || '',
    ingredients: ings
  };
}

// ── ADD INGREDIENT ROW ────────────────────────────────────────────
function addIngredient() {
  var g = document.getElementById('ingGroup');
  var div = document.createElement('div');
  div.className = 'ing-row-input';
  div.innerHTML = '<input placeholder="Ingredient name" oninput="liveUpdate()"><input placeholder="Amount" oninput="liveUpdate()">';
  g.appendChild(div);
}

// ── LIVE UPDATE (fires on every keystroke) ────────────────────────
function liveUpdate() {
  renderBox(getData(), document.getElementById('boxPreview'));
}

// ── UPDATE DESIGN BUTTON ──────────────────────────────────────────
function updateDesign() {
  liveUpdate();
  var btn = document.getElementById('updateBtn');
  btn.textContent = '✔ Updated!';
  btn.style.background = '#1e7e3e';
  setTimeout(function() {
    btn.textContent = '▶ Update Design';
    btn.style.background = '';
  }, 1800);
}

// ── CREATE MULTIPLE DESIGNS ───────────────────────────────────────
// Generates 3 variants: original, doubled price, halved qty label
function createMultiple() {
  var d = getData();

  var variants = [
    Object.assign({}, d, { _label: 'Design 1 — Standard',    _file: 'design-standard.html' }),
    Object.assign({}, d, { _label: 'Design 2 — Premium',     _file: 'design-premium.html',  effective: 'PREMIUM FORMULA', mrp: 'PREMIUM' }),
    Object.assign({}, d, { _label: 'Design 3 — Travel Size', _file: 'design-travel.html',   qty: '10Q', volume: '10 ml', mrp: 'TRAVEL' })
  ];

  var multiArea = document.getElementById('multiArea');
  var multiRow  = document.getElementById('multiRow');
  multiRow.innerHTML = '';
  multiArea.style.display = 'flex';

  variants.forEach(function(v) {
    var card = document.createElement('div');
    card.className = 'mini-card';
    card.innerHTML =
      '<button class="mc-dl-btn" onclick="downloadVariant(event, \'' + v._file + '\', ' + JSON.stringify(v).replace(/'/g,"&#39;") + ')">&#11015; DL</button>'
      + '<div class="mc-brand">' + v.brand + '</div>'
      + '<div class="mc-sub">' + v.ptype + '</div>'
      + '<div class="mc-mrp">MRP: ' + v.mrp + '</div>'
      + '<div class="mc-ptype">' + v.qty + ' · ' + v.volume + '</div>'
      + '<div style="margin-top:6px;font-size:9px;color:rgba(255,255,255,0.35);">' + v._label + '</div>';
    multiRow.appendChild(card);
  });

  multiArea.scrollIntoView({ behavior: 'smooth' });
}

// ── DOWNLOAD VARIANT ──────────────────────────────────────────────
function downloadVariant(e, filename, data) {
  e.stopPropagation();
  var html = generateFullHTML(data);
  downloadHTML(filename, html);
}

function downloadHTML(filename, html) {
  var blob = new Blob([html], { type: 'text/html' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── RENDER BOX INTO A CONTAINER ──────────────────────────────────
function renderBox(d, container) {
  container.innerHTML = buildBoxHTML(d, false);
}

// ── SVG PILL IMAGE ────────────────────────────────────────────────
function pillSVG(w, h, brand, sub) {
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" width="' + w + '" height="' + h + '" xmlns="http://www.w3.org/2000/svg">'
    + '<defs>'
    + '<radialGradient id="pg1" cx="35%" cy="30%"><stop offset="0%" stop-color="#aee4ff"/><stop offset="100%" stop-color="#0055aa"/></radialGradient>'
    + '<radialGradient id="cg1" cx="40%" cy="35%"><stop offset="0%" stop-color="#ffe090"/><stop offset="100%" stop-color="#c97a10"/></radialGradient>'
    + '</defs>'
    + '<rect x="' + (w*0.1) + '" y="' + (h*0.28) + '" width="' + (w*0.8) + '" height="' + (h*0.34) + '" rx="' + (h*0.17) + '" fill="url(#pg1)"/>'
    + '<line x1="' + (w*0.5) + '" y1="' + (h*0.28) + '" x2="' + (w*0.5) + '" y2="' + (h*0.62) + '" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>'
    + '<rect x="' + (w*0.5) + '" y="' + (h*0.28) + '" width="' + (w*0.4) + '" height="' + (h*0.34) + '" rx="' + (h*0.17) + '" fill="url(#cg1)"/>'
    + '<rect x="' + (w*0.5) + '" y="' + (h*0.28) + '" width="' + (w*0.2) + '" height="' + (h*0.34) + '" fill="url(#cg1)"/>'
    + (brand ? '<text x="' + (w*0.5) + '" y="' + (h*0.82) + '" text-anchor="middle" font-size="' + Math.max(5, w*0.07) + '" font-weight="700" fill="white" font-family="Montserrat,sans-serif">' + brand.toUpperCase().substring(0,8) + '</text>' : '')
    + '<ellipse cx="' + (w*0.3) + '" cy="' + (h*0.82) + '" rx="' + (w*0.11) + '" ry="' + (h*0.08) + '" fill="#4db8ff" opacity="0.7"/>'
    + '<ellipse cx="' + (w*0.72) + '" cy="' + (h*0.8) + '" rx="' + (w*0.1) + '" ry="' + (h*0.07) + '" fill="#c9a84c" opacity="0.7"/>'
    + '</svg>';
}

// ── BUILD BOX HTML (inline, no external files) ────────────────────
function buildBoxHTML(d, standalone) {
  var BU = d.brand.toUpperCase();

  // Ingredients list
  var ingLines = '';
  (d.ingredients || []).forEach(function(ing) {
    ingLines += '<div class="bing-row"><span style="font-size:6px;color:#d0eaff;">' + ing.name + '</span>'
      + '<span style="font-size:6px;color:#a0d4ff;font-weight:600;">' + ing.amount + '</span></div>';
  });

  var LEFT =

    + '.box-wave{position:absolute;bottom:0;left:0;right:0;height:65px;opacity:0.2;pointer-events:none;}'
    + '.bdot{position:absolute;border-radius:50%;background:rgba(77,184,255,0.1);pointer-events:none;}'

  var body = '<div class="price-tag">' + d.brand + ' · MRP ' + d.mrp + '</div>'
